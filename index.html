<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&  icon_names=local_dining,share,bookmark,timer,alarm,group"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css">
    <title>Recipe</title>
</head>
<body>
    <div class="background-container">
        <div class="main-container">
            <div class="nav-bar">
                <div class="left-nav-buttons">
                    <span class="material-symbols-outlined" id="local_dining">local_dining</span>
                    <div id="heading">Recipe details</div>
                </div>
                <div class="right-nav-buttons">
                    <div id="share-button">
                        <span class="material-symbols-outlined" id="share-icon">share</span>
                    </div>
                    <div id="bookmark-button">
                        <span class="material-symbols-outlined" id="bookmark-icon">bookmark</span>
                    </div>
                </div>
            </div>
            <div class="image-container">
                <div id="dinner-classic" class="image-container-items">DINNER CLASSIC</div>
                <div id="recipe-text" class="image-container-items">Classic Herb Roasted Chicken</div>
                <div id="recipe-subtext" class="image-container-items">A succulent roast chicken infused with aromatic garlic, rosemary, and thyme.</div>
            </div>
            <div class="details-container">

                <div id="prep-time-container" class="details-container-items">
                    <div id="top-items-of-prep" class="prep-time-container-items">
                        <span class="material-symbols-outlined" id="timer-icon">timer</span>
                        <span id="prep-text">PREP TIME</span>
                    </div>
                    <div id="bottom-items-of-prep" class="prep-time-container-items">
                        20 mins
                    </div>
                </div>

                <div id="cook-time-container" class="details-container-items">
                    <div id="top-items-of-cook" class="cook-time-container-items">
                        <span class="material-symbols-outlined" id="alarm-icon">alarm</span>
                        <span id="cook-text">COOK TIME</span>
                    </div>
                    <div id="bottom-items-of-cook" class="cook-time-container-items">
                        1 hr 15 mins
                    </div>
                </div>

                <div id="servings-container" class="details-container-items">
                    <div id="top-items-of-servings" class="servings-container-items">
                        <span class="material-symbols-outlined" id="group-icon">group</span>
                        <span id="servings-text">SERVINGS</span>
                    </div>
                    <div id="bottom-items-of-servings" class="servings-container-items">
                        4 servings
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</body>
</html>
